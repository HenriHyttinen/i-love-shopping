{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orders | Hardware Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'ui.css' %}">
</head>
<body>
<header>
  <div class="nav-wrap">
    <div>
      <div class="brand">Hardware Shop</div>
      <div class="footer-note">Order Tracking and Cancellation</div>
    </div>
    <nav>
      <a href="/">Home</a>
      <a href="/cart/">Cart</a>
      <a href="/checkout/">Checkout</a>
      <a class="active" href="/orders/">Orders</a>
    </nav>
  </div>
</header>

<main>
  <section class="panel">
    <h1>My Orders</h1>
    <div class="cols-2">
      <div>
        <label>Email</label><input id="auth-email" type="email" placeholder="user@example.com">
        <label>Password</label><input id="auth-password" type="password" placeholder="StrongPass123!">
        <button id="auth-login-btn">Login</button>
      </div>
      <div>
        <label>Status</label>
        <select id="status">
          <option value="">all</option>
          <option value="pending_payment">pending_payment</option>
          <option value="payment_successful">payment_successful</option>
          <option value="payment_failed">payment_failed</option>
          <option value="cancelled">cancelled</option>
        </select>
        <div class="grid">
          <div><label>Date from</label><input id="date_from" type="text" placeholder="2026-01-01"></div>
          <div><label>Date to</label><input id="date_to" type="text" placeholder="2026-12-31"></div>
        </div>
        <button id="load-orders-btn">Load Orders</button>
      </div>
    </div>
    <div id="orders-status" class="status info">Ready.</div>
  </section>

  <section>
    <div id="orders-list"></div>
  </section>

  <section class="panel">
    <h2>Debug</h2>
    <pre id="orders-json" class="code">[]</pre>
  </section>
</main>

<script src="{% static 'ui.js' %}"></script>
<script src="{% static 'orders.js' %}"></script>
</body>
</html>
