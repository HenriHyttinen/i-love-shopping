{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cart | Hardware Shop</title>
  <meta name="description" content="Manage shopping cart items, adjust quantities, remove products, and review subtotal before checkout.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'ui.css' %}">
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<header>
  <div class="nav-wrap">
    <div>
      <div class="brand">Hardware Shop</div>
      <div class="footer-note">Cart Testing Workspace</div>
    </div>
    <nav aria-label="Primary">
      <a href="/">Home</a>
      <a href="/products/">Products</a>
      <a href="/search/">Search</a>
      <a class="active" href="/cart/">Cart</a>
      <a href="/checkout/">Checkout</a>
      <a href="/orders/">Orders</a>
      <span id="nav-guest">
        <a href="/login/">Login</a>
        <a href="/register/">Register</a>
      </span>
      <span id="nav-member" style="display:none;">
        <a href="/account/">Account</a>
        <a href="#" id="nav-logout">Logout</a>
      </span>
    </nav>
  </div>
</header>

<main id="main-content" tabindex="-1">
  <section class="panel">
    <h1>Cart Management</h1>
    <div class="grid">
      <div><label>Product ID</label><input id="product-id" type="number" min="1" placeholder="1"></div>
      <div><label>Quantity</label><input id="quantity" type="number" min="1" value="1"></div>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button id="add-btn">Add Item</button>
      <button class="secondary" id="refresh-btn">Refresh</button>
    </div>
    <div id="cart-status" class="status info">Ready.</div>
    <p id="totals" class="muted">0 items • subtotal $0.00</p>
  </section>

  <section class="panel">
    <h2>Items</h2>
    <table class="table">
      <thead>
        <tr>
          <th>Item</th><th>Product</th><th>Unit</th><th>Qty</th><th>Total</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="cart-rows"><tr><td colspan="6" class="muted">Cart is empty.</td></tr></tbody>
    </table>
  </section>

  <section class="panel">
    <h2>Recommended</h2>
    <div id="recommended" class="product-grid"></div>
  </section>

  <section class="panel">
    <h2>Debug</h2>
    <pre id="cart-json" class="code">{}</pre>
  </section>
</main>

<script src="{% static 'ui.js' %}"></script>
<script src="{% static 'auth.js' %}"></script>
<script src="{% static 'cart.js' %}"></script>
<script>if (window.ShopAuth) window.ShopAuth.refreshAuthNav();</script>
</body>
</html>
