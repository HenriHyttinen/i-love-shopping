{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout | Hardware Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'ui.css' %}">
  <script src="https://js.stripe.com/v3/" async defer></script>
</head>
<body>
<header>
  <div class="nav-wrap">
    <div>
      <div class="brand">Hardware Shop</div>
      <div class="footer-note">Checkout Flow</div>
    </div>
    <nav>
      <a href="/">Home</a>
      <a href="/cart/">Cart</a>
      <a class="active" href="/checkout/">Checkout</a>
      <a href="/orders/">Orders</a>
    </nav>
  </div>
</header>

<main>
  <section class="panel">
    <h1>Checkout</h1>
    <p class="muted">Login is optional. Logged users can prefill name/email.</p>
    <div class="cols-2">
      <div>
        <label>Login Email</label><input id="auth-email" type="email" placeholder="user@example.com">
        <label>Password</label><input id="auth-password" type="password" placeholder="StrongPass123!">
        <button id="auth-login-btn">Login</button>
        <label>Access token (optional)</label><input id="auth-token" type="text" placeholder="paste access token">
        <button class="secondary" id="auth-token-btn">Use Token</button>
      </div>
      <div>
        <label>Full Name</label><input id="full_name" type="text" placeholder="Buyer Name">
        <label>Email</label><input id="email" type="email" placeholder="buyer@example.com">
        <label>Phone</label><input id="phone" type="text" placeholder="+358401234567">
      </div>
    </div>
  </section>

  <section class="panel">
    <h2>Shipping and Payment</h2>
    <div class="grid">
      <div><label>Address line 1</label><input id="line1" type="text"></div>
      <div><label>City</label><input id="city" type="text"></div>
      <div><label>State</label><input id="state" type="text"></div>
      <div><label>Postal code</label><input id="postal_code" type="text"></div>
      <div><label>Country</label><input id="country" type="text"></div>
      <div><label>Shipping option</label><select id="shipping_option"><option value="standard">standard</option><option value="express">express</option></select></div>
      <div><label>Payment method</label><select id="payment_method"><option value="stripe_sandbox">stripe_sandbox</option><option value="paypal_sandbox">paypal_sandbox</option></select></div>
      <div><label>Card number</label><input id="card_number" type="text" placeholder="4242424242424242"></div>
      <div><label>Expiry month</label><input id="expiry_month" type="number" value="12"></div>
      <div><label>Expiry year</label><input id="expiry_year" type="number" value="2028"></div>
      <div><label>CVV</label><input id="cvv" type="text" value="123"></div>
    </div>
    <div id="stripe-wrap" class="panel" style="display:none; margin-top:10px; padding:10px;">
      <label>Stripe Card Element</label>
      <div id="stripe-card" style="padding:10px; border:1px solid var(--line); border-radius:10px;"></div>
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button class="secondary" id="prefill-btn">Prefill</button>
      <button class="secondary" id="summary-btn">Load Summary</button>
      <button id="place-btn">Place Order</button>
    </div>
    <div id="checkout-status" class="status info">Ready.</div>
  </section>

  <section class="panel">
    <h2>Cart Summary</h2>
    <div id="cart-summary" class="muted">Loading...</div>
  </section>

  <section id="confirm" class="panel"></section>

  <section class="panel">
    <h2>Debug</h2>
    <pre id="checkout-json" class="code">{}</pre>
  </section>
</main>

<script src="{% static 'ui.js' %}"></script>
<script src="{% static 'checkout.js' %}"></script>
</body>
</html>
