<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Reset</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f6f6f6;
        margin: 0;
        padding: 24px;
      }
      .card {
        max-width: 480px;
        margin: 48px auto;
        background: #fff;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }
      h1 {
        font-size: 20px;
        margin: 0 0 16px;
      }
      label {
        display: block;
        font-size: 14px;
        margin: 12px 0 6px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
      }
      button {
        margin-top: 16px;
        padding: 10px 14px;
        border: none;
        border-radius: 6px;
        background: #0f5ee9;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      .muted {
        font-size: 12px;
        color: #666;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Reset your password</h1>
      <form method="post" action="/api/auth/password/reset/confirm/">
        <input type="hidden" name="uid" value="{{ uid }}">
        <input type="hidden" name="token" value="{{ token }}">
        <label for="new_password1">New password</label>
        <input id="new_password1" name="new_password1" type="password" required>
        <label for="new_password2">Confirm password</label>
        <input id="new_password2" name="new_password2" type="password" required>
        <button type="submit">Reset Password</button>
      </form>
      <div class="muted">
        This form submits to the API reset-confirm endpoint.
      </div>
    </div>
  </body>
</html>
