<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <style>
    text { font-family: "Times New Roman", serif; font-size: 14px; fill: #1d1c1a; }
    .box { fill: #fffaf0; stroke: #b7ad9c; stroke-width: 2; }
    .title { font-weight: bold; }
  </style>

  <rect class="box" x="40" y="40" width="220" height="140" />
  <text class="title" x="60" y="70">USER</text>
  <text x="60" y="95">id (PK)</text>
  <text x="60" y="115">email</text>
  <text x="60" y="135">full_name</text>
  <text x="60" y="155">otp_secret</text>

  <rect class="box" x="320" y="40" width="220" height="120" />
  <text class="title" x="340" y="70">CATEGORY</text>
  <text x="340" y="95">id (PK)</text>
  <text x="340" y="115">name</text>
  <text x="340" y="135">slug</text>

  <rect class="box" x="600" y="40" width="220" height="120" />
  <text class="title" x="620" y="70">BRAND</text>
  <text x="620" y="95">id (PK)</text>
  <text x="620" y="115">name</text>

  <rect class="box" x="200" y="230" width="500" height="210" />
  <text class="title" x="220" y="260">PRODUCT</text>
  <text x="220" y="285">id (PK)</text>
  <text x="220" y="305">name</text>
  <text x="220" y="325">description</text>
  <text x="220" y="345">price</text>
  <text x="220" y="365">stock_quantity</text>
  <text x="220" y="385">brand_id (FK)</text>
  <text x="220" y="405">category_id (FK)</text>

  <rect class="box" x="720" y="250" width="160" height="120" />
  <text class="title" x="735" y="280">PRODUCT_IMAGE</text>
  <text x="735" y="305">id (PK)</text>
  <text x="735" y="325">image</text>
  <text x="735" y="345">alt_text</text>

  <line x1="430" y1="160" x2="430" y2="230" stroke="#7a6f63" stroke-width="2" />
  <line x1="710" y1="160" x2="530" y2="230" stroke="#7a6f63" stroke-width="2" />
  <line x1="700" y1="320" x2="720" y2="320" stroke="#7a6f63" stroke-width="2" />

  <text x="440" y="200">1..* products</text>
  <text x="560" y="200">1..* products</text>
  <text x="705" y="310">1..* images</text>
</svg>
