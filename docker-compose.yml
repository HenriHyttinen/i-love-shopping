services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: hardware_shop
      POSTGRES_USER: hardware_user
      POSTGRES_PASSWORD: hardwarepass123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py seed_catalog &&
        python manage.py add_sample_images &&
        python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  nginx:
    image: nginx:1.27-alpine
    restart: always
    profiles: ["tls"]
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/tls/certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  postgres_data:
